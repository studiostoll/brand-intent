# Jekyll Configuration for intent.stoll.studio
title: "Brand Intent"
description: "An open file format specification for making brand intent machine-readable."
author: "Christophe Stoll"
email: "christophe@stoll.studio"
url: "https://intent.stoll.studio"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins: []

# Exclude files from processing
exclude:
  - README.md
  - CLAUDE.md
  - DESIGN.md
  - SPEC.md
  - examples/
  - parser/
  - skills/
  - .git
  - .gitignore
  - .gitmodules
  - node_modules/
  - package.json
  - package-lock.json

# Include files not processed by default
include:
  - _themes

# Sass settings
sass:
  style: compressed
